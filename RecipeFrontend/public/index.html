<!DOCTYPE html>
<html ng-app="recipeApp">
<head>
    <title>Thomas Tech Recipe App</title>
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/css/bootstrap.min.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./app/shared/styles.css?v=1.0.1">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>

<body ng-controller="appController">

<nav ng-hide="hideNavbar" class="navbar navbar-expand-md navbar-light bg-light">
    <img class="navbar-brand" src="./app/shared/logo.png" alt="Logo" width="130" height="90">

    <button class="navbar-toggler" type="button" data-toggle="collapse"
            data-target="#navbarSupportedContent">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarSupportedContent" style="font-size:14px;">
        <ul class="navbar-nav mr-auto">
            <li class="nav-item">
                <a class="nav-link" href="#!/home">Home</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" ng-click="GoToProfile()">Profile</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#!/week">Week Recipes</a>
            </li>

            <li class="nav-item">
                <a class="nav-link" href="#!/week">Little Chief</a>
            </li>
        </ul>
        <ul class="navbar-nav align-items-center">
            <li class="nav-item dropdown mr-3"
                ng-class="{ show: isFriendDropdownOpen }">
                <a class="nav-link" href="" role="button" ng-click="toggleFriendDropdown($event)" style="cursor: pointer;">
                    <i class="fa-solid fa-user-plus"></i>
                    <span class="badge badge-danger ml-1" ng-if="friendRequest.length > 0">{{friendRequest.length}}</span>
                </a>
                <div class="dropdown-menu dropdown-menu-right p-2"
                    ng-show="isFriendDropdownOpen"
                    style="width:300px; max-height:300px; overflow-y:auto; display:block;">
                    <div class="dropdown-item text-muted text-center"
                        ng-if="friendRequest.length === 0">
                        No friend requests
                    </div>
                    <div class="dropdown-item"
                        ng-repeat="request in friendRequest track by request.friendRequestID">

                        <div class="d-flex justify-content-between align-items-center">
                            <strong>{{ request.requestSender.fullName }}</strong>

                            <div>
                                <button class="btn btn-sm btn-success mr-1"
                                        ng-click="acceptFriendRequest(request)">
                                    ✓
                                </button>
                                <button class="btn btn-sm btn-danger"
                                        ng-click="declineFriendRequest(request)">
                                    ✕
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </li>

            <li class="nav-item">
                <form class="form-inline my-2" style="font-size:12px;">
                    <input class="form-control mr-sm-2"
                           type="search"
                           placeholder="Search"
                           style="height:28px; width:140px; font-size:12px;">
                    <button class="btn btn-outline-success"
                            type="submit"
                            style="height:28px; font-size:12px;">
                        Search
                    </button>
                </form>
            </li>

        </ul>
    </div>
</nav>

<!-- Main content -->
<div class="container">
    <div ng-view></div>
</div>

<!-- Notifications -->
<div class="notification-container">
    <div class="notification success" ng-show="notification.showSuccess">
        {{ notification.successMessage }}
    </div>
    <div class="notification fail" ng-show="notification.showFail">
        {{ notification.failMessage }}
    </div>
</div>

<!-- Loader -->
<div ng-show="isLoading" class="loader-overlay">
    <div class="loader"></div>
</div>

<!-- AngularJS -->
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular.min.js"></script>
<script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.2/angular-route.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/ngInfiniteScroll/1.3.0/ng-infinite-scroll.min.js"></script>

<!-- REQUIRED for Bootstrap 4 dropdowns -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.0.0/js/bootstrap.min.js"></script>

<!-- App Scripts -->
<script src="app.js"></script>
<script src="app/shared/notificationService.js"></script>
<script src="app/shared/loaderService.js"></script>
<script src="app/shared/filters.js"></script>
<script src="app/services/recipeService.js"></script>
<script src="app/services/userpostService.js"></script>
<script src="app/views/recipeViews/add/addRecipeController.js"></script>
<script src="app/views/recipeViews/edit/editrecipeController.js"></script>
<script src="app/views/recipeViews/view/viewrecipeController.js"></script>
<script src="app/views/recipeViews/main/recipeController.js"></script>
<script src="app/views/recipeViews/week/weekrecipesController.js"></script>
<script src="app/views/authetication/login/loginController.js"></script>
<script src="app/views/authetication/register/registerController.js"></script>
<script src="app/views/recipeViews/profile/profileController.js"></script>
<script src="app/views/recipeViews/profile/profileService.js"></script>
<script src="app/services/authService.js"></script>
<script src="app/services/usernotificationService.js"></script>

</body>
</html>
