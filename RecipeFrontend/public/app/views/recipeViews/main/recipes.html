<div style="padding: 8px;">
    <h5>Feed</h5>
  <button style="height:30px; width:100px; font-size:12px;" class="mainbutton" ng-click="ShowUserPost()"><i class="fa-solid fa-plus"></i>&nbsp;Add Post</button>
  <button style="height:30px; width:120px; font-size:12px;" class="mainbutton" ng-click="AddRecipe()"><i class="fa-solid fa-folder-closed"></i>&nbsp;Add Recipe</button>
  <textarea ng-model="UserPost" class="form-control" ng-hide="ShowPost == false" placeholder="What is on your mind?"></textarea>
  <button class="custombutton1" ng-click="PostUserPost()" ng-hide="ShowPost == false">Post</button>
  <button class="custombutton1" ng-click="HideUserPost()" ng-hide="ShowPost == false">Cancel</button>
  <div id="scrollableDiv" style="max-height: 580px; overflow-y: auto; border: 1px solid #ddd; margin-top: 10px;"infinite-scroll="loadMore()"infinite-scroll-distance="1"infinite-scroll-container="'#scrollableDiv'">
    <!-- Feed Items -->
    <div ng-repeat="item in feed track by (item.type + '-' + item.id)">
      <div class="card">
        <div class="card-body">
          <!-- Recipe -->
          <div ng-if="item.type === 'recipe'">
            <p class="card-title">{{item.title}}</p>
            <p>{{item.fullName}}</p>
            <!-- Recursive Comments -->
            <div ng-repeat="comment in item.comments | limitTo:(item.commentsExpanded ? item.comments.length : 3)" ng-include="'commentTree.html'"></div>
            <button style="padding-right: 8px;" class="text-button" ng-click="toggleLike(item)"><i class="fa-solid"ng-class="{'fa-thumbs-up': !item.likedByUser,'fa-thumbs-down': item.likedByUser === true}"></i>&nbsp;{{ item.likedByUser ? 'Unlike' : 'Like' }}</button>
            <button class="text-button" ng-click="item.commentsExpanded = true"><i class="fa-solid fa-message"></i>&nbsp;Comments</button>
            <button class="text-button" ng-if="item.commentsExpanded" ng-show="item.comments.length > 0" ng-click="item.commentsExpanded = false">Show less</button>
            <!-- Top-level comment box -->
            <textarea ng-if="item.commentsExpanded" style="width: 100%;" ng-model="newComment[item.id]" placeholder="Add a comment..."></textarea>
            <button ng-if="item.commentsExpanded" ng-click="postComment(item)">Post</button>
            <button ng-if="item.commentsExpanded" ng-click="item.commentsExpanded = false">Cancel</button>
          </div>
          <!-- Post -->
          <div ng-if="item.type === 'post'">
            <h5>{{item.fullName}}</h5>
            <p class="card-text">{{item.content}}</p>
            <!-- Recursive Comments -->
            <button style="padding-right: 8px;" class="text-button" ng-click="toggleLike(item)"><i class="fa-solid"ng-class="{'fa-thumbs-up': !item.likedByUser,'fa-thumbs-down': item.likedByUser === true}"></i>&nbsp;{{ item.likedByUser ? 'Unlike' : 'Like' }}</button>
            <textarea ng-if="item.commentsExpanded" style="width: 100%;" ng-model="newComment[item.id]" placeholder="Add a comment..."></textarea>
            <button ng-if="item.commentsExpanded" ng-click="postComment(item)">Post</button>
            <button ng-if="item.commentsExpanded" ng-click="item.commentsExpanded = false">Cancel</button>
            <div ng-repeat="comment in item.comments | limitTo:(item.commentsExpanded ? item.comments.length : 0)" ng-include="'commentTree.html'"></div>
            <button ng-hide="item.commentsExpanded" class="text-button" ng-click="item.commentsExpanded = true"><i class="fa-solid fa-message"></i>&nbsp;Comments</button>
            <button class="text-button" ng-if="item.commentsExpanded" ng-show="item.comments.length > 0" ng-click="item.commentsExpanded = false">Show less</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
<!-- Recursive Comment Template -->
<script type="text/ng-template" id="commentTree.html">
  <div class="comment" style="border: 1px solid #ccc; padding: 10px; margin-top: 10px;">
    <p style="margin-bottom: 2px;"><strong>{{comment.fullName}}</strong>: {{comment.content}}</p>
      <div>
          <small>{{comment.createdAt | timeAgoOrDate}}</small>
          <button class="text-button" ng-hide="showReplyBox[comment.commentId]" ng-click="toggleReplyBox(comment)">Reply</button>
          <button style="padding-right: 8px;" class="text-button" ng-click="toggleLike(comment)"><i class="fa-solid"ng-class="{'fa-thumbs-up': !comment.likedByUser,'fa-thumbs-down': comment.likedByUser === true}"></i></button>
      </div>
      
    <div ng-show="showReplyBox[comment.commentId]">
      <textarea style="width: 100%;" ng-model="newReply[comment.commentId]" placeholder="Write a reply..."></textarea>
      <div>
          <button ng-click="postReply(item, comment)">Post</button>
          <button ng-click="toggleReplyBox(comment)">Cancel</button>
      </div>
    </div>
    <!-- Nested replies -->
    <div class="replies" style="margin-left:20px;" ng-if="comment.replies.length > 0">
      <div ng-repeat="reply in comment.replies" ng-include="'commentTree.html'" ng-init="comment = reply"></div>
    </div>
  </div>
</div>
</script>
